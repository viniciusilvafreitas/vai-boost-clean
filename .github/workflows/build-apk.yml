name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Project
        run: |
          npm run build
        
      - name: Setup Capacitor and Android Folder
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Vai Boost Clean" "com.vinicius.vaiboostclean" --web-dir=dist || true
          npx cap add android || true
          
          # 🛠️ INJEÇÃO DA CORREÇÃO DO KOTLIN:
          # Esse trecho entra no arquivo do Gradle e força a unificação das versões duplicadas
          echo -e "\nsubprojects {\n    project.configurations.all {\n        resolutionStrategy.eachDependency { details ->\n            if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.startsWith('kotlin-stdlib')) {\n                details.useVersion '1.8.22'\n            }\n        }\n    }\n}" >> android/build.gradle
          
          npx cap sync
          
      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vai-boost-clean-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
